services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-backend
    restart: always
    env_file:
      - .env
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      TELEGRAM_RECEIVER_MODE: ${TELEGRAM_RECEIVER_MODE:-polling}
      CONTROL_BOT_ENABLED: ${CONTROL_BOT_ENABLED:-true}
      CONTROL_BOT_TOKEN: ${CONTROL_BOT_TOKEN:-}
      CONTROL_CHAT_ID: ${CONTROL_CHAT_ID:-}
      CONTROL_ADMIN_IDS: ${CONTROL_ADMIN_IDS:-}
      CONTROL_COMMANDS_ENABLED: ${CONTROL_COMMANDS_ENABLED:-true}
      CONTROL_ALERTS_ENABLED: ${CONTROL_ALERTS_ENABLED:-true}
      CONTROL_ALERT_THREAD_ID: ${CONTROL_ALERT_THREAD_ID:-}
      CONTROL_COMMAND_THREAD_ID: ${CONTROL_COMMAND_THREAD_ID:-}
      CONTROL_POLLING_TIMEOUT: ${CONTROL_POLLING_TIMEOUT:-30}
      CONTROL_NOTIFY_LEVEL: ${CONTROL_NOTIFY_LEVEL:-error}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/backend/logs

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: tg-admin
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"
