services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-backend
    restart: always
    env_file:
      - .env
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      TELEGRAM_RECEIVER_MODE: ${TELEGRAM_RECEIVER_MODE:-polling}
      CONTROL_BOT_TOKEN: ${CONTROL_BOT_TOKEN:-}
      ALERT_CHAT_ID: ${ALERT_CHAT_ID:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/backend/logs

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: tg-admin
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"
